# BMI/Nutrition Study Data Generation Configuration
# Based on Neural Causal Abstractions paper (Xia & Bareinboim, 2024)
# GitHub: https://github.com/CausalAILab/NeuralCausalAbstractions
model_type: 'nonlinear_anm'
experiment_name: 'bmi_nutrition'
seed: 42

# Data paths
data_paths:
  ll_scm: 'data/bmi_nutrition/ll_scm.pkl'
  hl_scm: 'data/bmi_nutrition/hl_scm.pkl'
  ll_data: 'data/bmi_nutrition/ll_data.pkl'
  hl_data: 'data/bmi_nutrition/hl_data.pkl'

# Variable definitions (matching the paper exactly)
variables:
  low_level:
    nodes: ['R', 'D', 'C', 'F', 'P', 'B']
    # R: Restaurant (32-d one-hot)
    # D: Dish ordered (32-d one-hot)
    # C: Carbohydrates (real-valued, grams)
    # F: Fat (real-valued, grams) 
    # P: Protein (real-valued, grams)
    # B: BMI (real-valued)
  high_level:
    nodes: ['D_H', 'Z', 'B_H']
    # D_H: Dish type (binary: 0=healthy, 1=unhealthy)
    # Z: Calories (binary: 0=low, 1=high ≥1080)
    # B_H: BMI category (binary: 0=normal, 1=overweight ≥25)

# Abduction settings
abduction:
  use_intercept: true
  model_type: 'neural_network'  # Non-linear relationships require NN
  hidden_layers: [64, 32, 16]
  activation: 'relu'
  dropout: 0.1

# Preprocessing settings
preprocessing:
  ll_rename:
    BMI: 'BMI'
    Dietary_Fiber: 'Dietary_Fiber'
    Protein_Intake: 'Protein_Intake'
    Physical_Activity: 'Physical_Activity'
    Age: 'Age'
    Gender: 'Gender'
  hl_rename:
    Health_Score: 'Health_Score'
    Nutrition_Quality: 'Nutrition_Quality'
    Lifestyle_Factor: 'Lifestyle_Factor'

# Intervention definitions (matching paper specification)
interventions:
  low_level:
    # Dish interventions (do(D) interventions) - key from paper
    dish_interventions:
      - {'D': 0}   # Healthy dish (index 0-15)
      - {'D': 10}  # Healthy dish (index 0-15) 
      - {'D': 20}  # Unhealthy dish (index 16-31)
      - {'D': 25}  # Unhealthy dish (index 16-31)
  high_level:
    # High-level dish interventions (D_H interventions)
    dish_interventions:
      - {'D_H': 0}   # Healthy dish (binary)
      - {'D_H': 1}   # Unhealthy dish (binary)

# Bootstrap settings for data augmentation
bootstrap:
  enabled: true
  min_samples: 50  # Larger minimum for nutrition data
  preserve_large_samples: true

# Output settings
output:
  save_directory: 'data/nutrition'
  ll_model_file: 'LLmodel.pkl'
  hl_model_file: 'HLmodel.pkl'
  abstraction_file: 'abstraction_data.pkl'

# Quality control and logging
logging:
  level: INFO
  log_file: 'nutrition_data_prep.log'

# Advanced settings
advanced:
  prefer_parquet: false  # Use CSV for nutrition data
  data_dtype: float
  normalize_features: true
  feature_scaling: 'standard'  # StandardScaler for nutrition data
