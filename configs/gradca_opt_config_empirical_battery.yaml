# GradCA Optimization Configuration for Battery Data
method: "gradca"
description: "GradCA (non-robust baseline with Θ=Φ=0)"

# Optimization parameters
optimization:
  eta_min: 0.001         # Learning rate for T matrix
  num_steps_min: 1       # Steps per T update
  max_iter: 5000         # Maximum iterations
  tol: 0.0001            # Convergence tolerance
  initialization: "zeros"  # "zeros" or "random"
  gain: 0.0              # Xavier initialization gain (0.0 = no Xavier)
  optimizers: "adam"     # "adam" or "adam_betas"

# Cross-validation
cv:
  test_size: 0.1
  seeds: [42, 43, 44, 45, 46]

# Output
output:
  save_directory: "data/battery/results_empirical_9010"
  filename_prefix: "gradca_cv_results_empirical"