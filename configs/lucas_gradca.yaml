# configs/lucas_gradca.yaml
method: "gradca"
enabled: true
description: "Optimized GradCA on non-linear LUCAS"

data:
  data_path: "data/lucas/lucas_pack.pkl"
  experiment: "lucas"

optimization:
  eta_min: 0.01           # UPDATED: Key to getting ~2.42 error
  max_iter: 5000
  num_steps_min: 1
  tol: 0.000001           # UPDATED: Stricter tolerance
  initialization: "zeros" # For adversary; code handles T
  gain: 0.0
  optimizers: "adam"

cv:
  k_folds: 5
  seed: 23

output:
  save_directory: "data/lucas/results_nonlinear"
  filename_prefix: "gradca_cv_results_empirical"